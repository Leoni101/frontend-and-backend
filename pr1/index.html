<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Зоомагазин - Ошейник для собак</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="product-card">
        <div class="product-card__badge">Новинка</div>
        <img class="product-card__image" src="collar.jpg" alt="Ошейник для собаки">
        <div class="product-card__content">
            <h2 class="product-card__title">Ошейник для собак "Rungo"</h2>
            <p class="product-card__description">
                Стильный и прочный кожаный ошейник для собак средних и крупных пород. 
                Мягкая внутренняя сторона не натирает шею питомца. 
                Регулируется по размеру от 35 до 55 см. 
                Оснащен металлической фурнитурой, устойчивой к коррозии.
            </p>
            <div class="product-card__price">
                <span class="product-card__price-old">1 890 ₽</span>
                <span class="product-card__price-current">1 490 ₽</span>
            </div>
            <a href="#" class="product-card__button">В корзину 🛒</a>
        </div>
    </div>
</body>
</html>
